backend:
  name: github
  repo: Abubakar-Lukyamuzi/bul
  branch: main
  auth_endpoint: api/auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "_data"
    create: true
    slug: "products"
    format: "json"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image", allow_multiple: false}

  - name: "gallery"
    label: "Gallery"
    folder: "_data"
    create: true
    slug: "gallery"
    format: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image", allow_multiple: false}

  - name: "updates"
    label: "Updates"
    folder: "_data"
    create: true
    slug: "updates"
    format: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime"}

  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Description", name: "heroDescription", widget: "text"}
          - {label: "About Text", name: "aboutText", widget: "markdown"}
